<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PathForge TD</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        touch-action: manipulation;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
        color: #fff;
        font-family: 'Courier New', Courier, monospace;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #game-container {
        position: relative;
        width: 100vw;
        height: 56.25vw;
        max-width: 960px;
        max-height: 540px;
        image-rendering: pixelated;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
      }
      @media (max-aspect-ratio: 16/9) {
        #game-container {
          width: 100vw;
          height: 56.25vw;
        }
      }
      @media (min-aspect-ratio: 16/9) {
        #game-container {
          width: 177.78vh;
          height: 100vh;
        }
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        touch-action: none;
      }
      .screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: rgba(26, 26, 46, 0.95);
        z-index: 10;
        padding: 20px;
        overflow-y: auto;
      }
      .screen.active {
        display: flex;
      }
      .screen h1 {
        font-size: clamp(32px, 8vw, 48px);
        margin-bottom: 10px;
        color: #ffd700;
        text-shadow: 2px 2px 0 #000;
        text-align: center;
      }
      .screen h2 {
        font-size: clamp(24px, 6vw, 32px);
        margin-bottom: 20px;
        color: #fff;
        text-align: center;
      }
      .screen p {
        color: #aaa;
        margin-bottom: 20px;
        font-size: 14px;
        text-align: center;
      }
      .btn {
        background: #2d4a3e;
        border: 2px solid #4caf50;
        color: #fff;
        padding: 12px 32px;
        margin: 6px;
        font-size: 16px;
        font-family: 'Courier New', Courier, monospace;
        cursor: pointer;
        transition: all 0.15s;
        min-width: 200px;
        text-align: center;
        touch-action: manipulation;
      }
      .btn:hover, .btn:active {
        background: #4caf50;
        transform: scale(1.05);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .btn.secondary {
        background: #3a3a4a;
        border-color: #6b6b8a;
      }
      .btn.secondary:hover, .btn.secondary:active {
        background: #6b6b8a;
      }
      .btn-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 500px;
      }
      .level-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
        gap: 12px;
        margin: 20px 0;
        width: 100%;
        max-width: 400px;
      }
      .level-btn {
        width: 100%;
        aspect-ratio: 1;
        background: #2d4a3e;
        border: 2px solid #4caf50;
        color: #fff;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 14px;
      }
      .level-btn:hover, .level-btn:active {
        background: #4caf50;
      }
      .level-btn.locked {
        background: #3a3a4a;
        border-color: #666;
        color: #888;
        cursor: not-allowed;
      }
      .level-btn .stars {
        color: #ffd700;
        font-size: 12px;
        margin-top: 4px;
      }
      .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        max-width: 400px;
        margin: 10px 0;
        padding: 10px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 4px;
      }
      .setting-row label {
        color: #fff;
        font-size: 14px;
      }
      .setting-row input[type="range"] {
        width: 150px;
      }
      .setting-row select {
        background: #2d4a3e;
        color: #fff;
        border: 1px solid #4caf50;
        padding: 4px 8px;
        font-family: inherit;
      }
      .setting-value {
        color: #ffd700;
        min-width: 40px;
        text-align: right;
      }
      #pause-hint {
        position: absolute;
        top: 5px;
        right: 10px;
        color: #aaa;
        font-size: 12px;
        z-index: 5;
        pointer-events: none;
      }
      .scrollable {
        overflow-y: auto;
        max-height: 60%;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas" width="960" height="540"></canvas>
      <div id="pause-hint">ESC: 取消选择 | 空格: 开始/暂停 | 右键: 取消</div>

      <!-- 主菜单 -->
      <div id="main-menu" class="screen active">
        <h1>PathForge TD</h1>
        <p>Shape the Maze. Defend the Core.</p>
        <div class="btn-row">
          <button class="btn" id="btn-campaign">战役模式</button>
          <button class="btn" id="btn-endless">无尽模式</button>
          <button class="btn secondary" id="btn-stats">统计与成就</button>
          <button class="btn secondary" id="btn-settings">设置</button>
        </div>
      </div>

      <!-- 关卡选择 -->
      <div id="level-select" class="screen">
        <h2>选择关卡</h2>
        <div class="level-grid" id="level-grid"></div>
        <button class="btn secondary" id="btn-back-main">返回主菜单</button>
      </div>

      <!-- 暂停菜单 -->
      <div id="pause-menu" class="screen">
        <h2>已暂停</h2>
        <button class="btn" id="btn-resume">继续游戏</button>
        <button class="btn secondary" id="btn-restart">重新开始</button>
        <button class="btn secondary" id="btn-quit">退出到主菜单</button>
      </div>

      <!-- 统计与成就 -->
      <div id="stats-screen" class="screen">
        <h2>统计与成就</h2>
        <div id="stats-content" class="scrollable">
          <div id="stats-summary" style="margin-bottom: 20px; color: #aaa; text-align: center;"></div>
          <div id="achievements-list"></div>
        </div>
        <button class="btn secondary" id="btn-back-main-stats">返回主菜单</button>
      </div>

      <!-- 设置 -->
      <div id="settings-screen" class="screen">
        <h2>设置</h2>
        <div id="settings-content" class="scrollable">
          <div class="setting-row">
            <label>主音量</label>
            <input type="range" id="setting-master" min="0" max="100" value="100" />
            <span class="setting-value" id="value-master">100%</span>
          </div>
          <div class="setting-row">
            <label>音乐音量</label>
            <input type="range" id="setting-music" min="0" max="100" value="40" />
            <span class="setting-value" id="value-music">40%</span>
          </div>
          <div class="setting-row">
            <label>音效音量</label>
            <input type="range" id="setting-sfx" min="0" max="100" value="70" />
            <span class="setting-value" id="value-sfx">70%</span>
          </div>
          <div class="setting-row">
            <label>画质</label>
            <select id="setting-quality">
              <option value="low">低</option>
              <option value="medium">中</option>
              <option value="high" selected>高</option>
            </select>
          </div>
          <div class="setting-row">
            <label>路径预览</label>
            <input type="checkbox" id="setting-path-preview" checked />
          </div>
          <div class="setting-row">
            <label>粒子特效</label>
            <input type="checkbox" id="setting-particles" checked />
          </div>
        </div>
        <div class="btn-row">
          <button class="btn secondary" id="btn-reset-settings">恢复默认</button>
          <button class="btn secondary" id="btn-back-main-settings">返回主菜单</button>
        </div>
      </div>

      <!-- 游戏结束 -->
      <div id="game-over" class="screen">
        <h2 id="game-over-title">游戏结束</h2>
        <p id="game-over-stats"></p>
        <button class="btn" id="btn-retry">再试一次</button>
        <button class="btn secondary" id="btn-back-levels">关卡选择</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
