<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PathForge TD</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        touch-action: manipulation;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1016;
        color: #fff;
        font-family: 'Courier New', Courier, monospace;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #game-container {
        position: relative;
        width: 100vw;
        height: 56.25vw;
        max-width: 960px;
        max-height: 540px;
        image-rendering: pixelated;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(108, 214, 166, 0.18);
        background: #0f151d;
      }
      @media (max-aspect-ratio: 16/9) {
        #game-container {
          width: 100vw;
          height: 56.25vw;
        }
      }
      @media (min-aspect-ratio: 16/9) {
        #game-container {
          width: 177.78vh;
          height: 100vh;
        }
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        touch-action: none;
      }
      .screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background:
          linear-gradient(rgba(108, 214, 166, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(108, 214, 166, 0.035) 1px, transparent 1px),
          linear-gradient(180deg, rgba(12, 19, 25, 0.96), rgba(8, 12, 18, 0.98));
        background-size: 32px 32px, 32px 32px, 100% 100%;
        z-index: 10;
        padding: 20px;
        overflow-y: auto;
      }
      .screen.active {
        display: flex;
      }
      .screen h1 {
        font-size: clamp(32px, 8vw, 48px);
        margin-bottom: 10px;
        color: #f7d86a;
        text-shadow: 0 2px 0 #000, 0 0 22px rgba(247, 216, 106, 0.18);
        text-align: center;
        letter-spacing: 0;
      }
      .screen h2 {
        font-size: clamp(24px, 6vw, 32px);
        margin-bottom: 20px;
        color: #dff7ea;
        text-align: center;
        letter-spacing: 0;
      }
      .screen p {
        color: #9fb8b0;
        margin-bottom: 20px;
        font-size: 14px;
        text-align: center;
      }
      .btn {
        background: linear-gradient(180deg, #2c6b55, #174536);
        border: 1px solid #6cd6a6;
        color: #eef9f3;
        padding: 12px 32px;
        margin: 6px;
        font-size: 16px;
        font-family: 'Courier New', Courier, monospace;
        cursor: pointer;
        transition: all 0.15s;
        min-width: 200px;
        text-align: center;
        touch-action: manipulation;
        border-radius: 7px;
        box-shadow: 0 4px 0 rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255,255,255,0.16);
      }
      .btn:hover, .btn:active {
        background: linear-gradient(180deg, #347c63, #1d5542);
        transform: translateY(-1px);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .btn.secondary {
        background: linear-gradient(180deg, #263440, #171f28);
        border-color: #566b75;
      }
      .btn.secondary:hover, .btn.secondary:active {
        background: linear-gradient(180deg, #314350, #202b35);
      }
      .btn-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 500px;
      }
      .level-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
        gap: 12px;
        margin: 20px 0;
        width: 100%;
        max-width: 400px;
      }
      .level-btn {
        width: 100%;
        aspect-ratio: 1;
        background: linear-gradient(180deg, #243541, #111a22);
        border: 1px solid rgba(108, 214, 166, 0.74);
        color: #eef9f3;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 14px;
        border-radius: 8px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 6px 16px rgba(0,0,0,0.22);
      }
      .level-btn:hover, .level-btn:active {
        background: linear-gradient(180deg, #2f6956, #173d31);
      }
      .level-btn.locked {
        background: linear-gradient(180deg, #242a30, #15191e);
        border-color: #4a5458;
        color: #7f8b90;
        cursor: not-allowed;
      }
      .level-btn .stars {
        color: #ffd700;
        font-size: 12px;
        margin-top: 4px;
      }
      .setting-row {
        display: grid;
        grid-template-columns: minmax(96px, 1fr) minmax(150px, 190px) 52px;
        align-items: center;
        gap: 12px;
        width: min(100%, 480px);
        min-height: 44px;
        margin: 6px auto;
        padding: 9px 12px;
        background: rgba(255, 255, 255, 0.055);
        border: 1px solid rgba(255,255,255,0.09);
        border-radius: 8px;
      }
      .setting-row label {
        color: #fff;
        font-size: 14px;
        line-height: 1.3;
      }
      .setting-row input[type="range"] {
        width: 100%;
        min-width: 0;
      }
      .setting-row select {
        background: #17271f;
        color: #eef9f3;
        border: 1px solid #6cd6a6;
        width: 100%;
        min-width: 0;
        padding: 7px 8px;
        font-family: inherit;
        border-radius: 4px;
      }
      .setting-row input[type="checkbox"] {
        width: 20px;
        height: 20px;
        justify-self: start;
        accent-color: #6cd6a6;
      }
      .setting-row select,
      .setting-row input[type="checkbox"] {
        grid-column: 2 / 4;
      }
      .setting-value {
        color: #f7d86a;
        min-width: 52px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      #settings-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 560px;
        max-height: calc(100% - 132px);
        margin: 0 auto 12px;
        padding: 2px 8px;
      }
      #settings-screen .btn-row {
        gap: 8px;
        max-width: 480px;
      }
      #pause-hint {
        display: none;
      }
      .scrollable {
        overflow-y: auto;
        max-height: 60%;
        width: 100%;
      }
      @media (max-width: 560px) {
        #game-container:has(.screen.active) {
          height: 100vh;
          max-height: none;
        }
        #settings-screen {
          justify-content: flex-start;
          padding: 14px;
        }
        #settings-screen h2 {
          margin-bottom: 10px;
        }
        #settings-content {
          flex: 1 1 auto;
          max-height: none;
          min-height: 0;
          margin-bottom: 8px;
        }
        .setting-row {
          grid-template-columns: 1fr;
          gap: 8px;
        }
        .setting-row select,
        .setting-row input[type="checkbox"] {
          grid-column: auto;
        }
        .setting-value {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas" width="960" height="540"></canvas>
      <div id="pause-hint">ESC: 菜单 | 空格: 开始/暂停 | Q/W/E: 1x/2x/3x | 右键: 取消</div>

      <!-- 主菜单 -->
      <div id="main-menu" class="screen active">
        <h1>PathForge TD</h1>
        <p>Shape the Maze. Defend the Core.</p>
        <div class="btn-row">
          <button class="btn" id="btn-campaign">战役模式</button>
          <button class="btn" id="btn-endless">无尽模式</button>
          <button class="btn secondary" id="btn-stats">统计与成就</button>
          <button class="btn secondary" id="btn-settings">设置</button>
        </div>
      </div>

      <!-- 关卡选择 -->
      <div id="level-select" class="screen">
        <h2>选择关卡</h2>
        <div class="level-grid" id="level-grid"></div>
        <button class="btn secondary" id="btn-back-main">返回主菜单</button>
      </div>

      <!-- 暂停菜单 -->
      <div id="pause-menu" class="screen">
        <h2>已暂停</h2>
        <button class="btn" id="btn-resume">继续游戏</button>
        <button class="btn secondary" id="btn-restart">重新开始</button>
        <button class="btn secondary" id="btn-quit">退出到主菜单</button>
      </div>

      <!-- 统计与成就 -->
      <div id="stats-screen" class="screen">
        <h2>统计与成就</h2>
        <div id="stats-content" class="scrollable">
          <div id="stats-summary" style="margin-bottom: 20px; color: #aaa; text-align: center;"></div>
          <div id="achievements-list"></div>
        </div>
        <button class="btn secondary" id="btn-back-main-stats">返回主菜单</button>
      </div>

      <!-- 设置 -->
      <div id="settings-screen" class="screen">
        <h2>设置</h2>
        <div id="settings-content" class="scrollable">
          <div class="setting-row">
            <label>主音量</label>
            <input type="range" id="setting-master" min="0" max="100" value="100" />
            <span class="setting-value" id="value-master">100%</span>
          </div>
          <div class="setting-row">
            <label>音乐音量</label>
            <input type="range" id="setting-music" min="0" max="100" value="40" />
            <span class="setting-value" id="value-music">40%</span>
          </div>
          <div class="setting-row">
            <label>音效音量</label>
            <input type="range" id="setting-sfx" min="0" max="100" value="70" />
            <span class="setting-value" id="value-sfx">70%</span>
          </div>
          <div class="setting-row">
            <label>画质</label>
            <select id="setting-quality">
              <option value="low">低</option>
              <option value="medium">中</option>
              <option value="high" selected>高</option>
            </select>
          </div>
          <div class="setting-row">
            <label>路径预览</label>
            <input type="checkbox" id="setting-path-preview" checked />
          </div>
          <div class="setting-row">
            <label>粒子特效</label>
            <input type="checkbox" id="setting-particles" checked />
          </div>
        </div>
        <div class="btn-row">
          <button class="btn secondary" id="btn-reset-settings">恢复默认</button>
          <button class="btn secondary" id="btn-back-main-settings">返回主菜单</button>
        </div>
      </div>

      <!-- 游戏结束 -->
      <div id="game-over" class="screen">
        <h2 id="game-over-title">游戏结束</h2>
        <p id="game-over-stats"></p>
        <button class="btn" id="btn-next-level">继续下一关</button>
        <button class="btn" id="btn-retry">再试一次</button>
        <button class="btn secondary" id="btn-back-levels">关卡选择</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
